name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; never cancel one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Deployment identity lives in exactly one place. Fail loudly if it leaks.
      - name: Check for hard-coded paths and contact details
        run: npm run check:links

      - name: Build
        env:
          # Project site today. For a user site: SITE_URL=https://<user>.github.io, BASE_PATH=/
          # For a custom domain (Gate 4+): set SITE_URL, BASE_PATH=/, add public/CNAME, point DNS.
          SITE_URL: https://ahmedeldep30-ship-it.github.io
          BASE_PATH: /ahmed-hamdy-portfolio
        run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
